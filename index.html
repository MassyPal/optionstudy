<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptionStrat Strategy Builder</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="strategy-summary">
                <div>
                    <h3>Riepilogo Strategia</h3>
                    <span id="strategy-summary">Nessuna opzione aggiunta</span>
                </div>
            </div>
            <div class="strategy-template-box">
                <label for="strategy-preset">Strategia predefinita</label>
                <select id="strategy-preset" class="strategy-template-select">
                    <option value="">Seleziona una strategia...</option>
                    <option value="ironCondor">Iron Condor</option>
                    <option value="ironButterfly">Iron Butterfly</option>
                    <option value="bullPutSpread">Bull Put Spread (Credit Spread)</option>
                    <option value="bearCallSpread">Bear Call Spread (Credit Spread)</option>
                    <option value="bullCallSpread">Bull Call Spread (Debit Spread)</option>
                    <option value="bearPutSpread">Bear Put Spread (Debit Spread)</option>
                </select>
            </div>
            <div id="strategy-display" class="strategy-list">
                <div class="empty-state">Nessuna opzione aggiunta. Usa i controlli a destra per iniziare.</div>
            </div>
        </div>
        <div class="right">
            <div class="controls">
                <h3>Aggiungi Opzione</h3>
                <input type="text" id="ticker" value="XSP" placeholder="Ticker (es. AAPL)">
                <input type="date" id="expiration" aria-label="Scadenza" title="Scegli la data di scadenza">
                
                <input type="text" id="strike" placeholder="Strike (es. 150)">
                <input type="text" id="price" placeholder="Prezzo (es. 5.00) - opzionale">
                
                <div class="button-row">
                    <button id="buyPut">Compra PUT</button>
                    <button id="sellPut">Vendi PUT</button>
                </div>
                <div class="button-row">
                    <button id="buyCall">Compra CALL</button>
                    <button id="sellCall">Vendi CALL</button>
                </div>
                
                <hr class="section-divider">
                
                <button id="clearAll" class="danger mb-15">Cancella Tutto</button>
                <button id="openOptionStrat" class="primary mt-auto">Apri su OptionStrat</button>
            </div>
            
            <div class="right-footer">
                <h4 class="url-preview-title">URL Preview</h4>
                <div class="url-box" id="url-preview">-</div>
            </div>
        </div>
    </div>

    
    <script src="assets/app.js"></script>
</body>
</html>
