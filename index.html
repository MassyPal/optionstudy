<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptionStrat Strategy Builder</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .left {
            width: 80%;
            padding: 24px;
            background-color: #111827;
            box-sizing: border-box;
            overflow-y: auto;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .right {
            width: 20%;
            padding: 20px;
            background-color: #0f172a;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            box-sizing: border-box;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #1e293b;
            color: #e2e8f0;
        }
        input::placeholder {
            color: #94a3b8;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 4px;
            font-weight: 500;
        }
        button:hover {
            background-color: #334155;
        }
        button.primary {
            background-color: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
        }
        button.primary:hover {
            background-color: #45a049;
        }
        #buyPut,
        #sellPut {
            background-color: #f44336;
            color: white;
            border: none;
        }
        #buyPut:hover,
        #sellPut:hover {
            background-color: #da190b;
        }
        #buyCall,
        #sellCall {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        #buyCall:hover,
        #sellCall:hover {
            background-color: #45a049;
        }
        button.danger {
            background-color: #f44336;
            color: white;
            border: none;
        }
        button.danger:hover {
            background-color: #da190b;
        }
        h3 {
            margin-top: 0;
        }
        h4 {
            margin-bottom: 10px;
        }
        .strategy-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-radius: 10px;
            background-color: #0f172a;
            border: 1px solid #334155;
        }
        .strategy-summary h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.02em;
        }
        .strategy-summary span {
            color: #cbd5e1;
            font-size: 14px;
        }
        .strategy-template-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 14px 16px;
            border-radius: 10px;
            background-color: #111827;
            border: 1px solid #334155;
        }
        .strategy-template-box label {
            font-size: 13px;
            color: #94a3b8;
        }
        .strategy-template-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #1e293b;
            color: #e2e8f0;
        }
        .strategy-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }
        .strategy-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #334155;
            background-color: #111827;
        }
        .strategy-table th,
        .strategy-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
            font-size: 14px;
            color: #e2e8f0;
        }
        .strategy-table th {
            background-color: #0f172a;
            color: #94a3b8;
            font-weight: 600;
        }
        .strategy-table tbody tr:last-child td {
            border-bottom: none;
        }
        .strategy-table td.actions {
            text-align: right;
            width: 70px;
        }
        .strategy-table tbody tr.put {
            background-color: rgba(244, 67, 54, 0.24);
        }
        .strategy-table tbody tr.call {
            background-color: rgba(76, 175, 80, 0.24);
        }
        .strategy-table input,
        .strategy-table select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #334155;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
            background-color: #1f2937;
            color: #e2e8f0;
        }
        .strategy-table select {
            background-color: #111827;
        }
        .strategy-remove {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s ease, color 0.2s ease;
            white-space: nowrap;
        }
        .strategy-remove:hover {
            background-color: #ef4444;
            color: white;
        }
        .empty-state {
            text-align: center;
            color: #475569;
            padding: 20px;
            font-size: 14px;
        }
        .strategy-remove:hover {
            background-color: #ef4444;
            color: white;
        }
        .strategy-remove:hover {
            background-color: #f44336;
            color: white;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }
        .controls {
            flex-shrink: 0;
        }
        .url-box {
            background-color: #1e293b;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 4px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 11px;
            word-break: break-all;
            font-family: monospace;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="strategy-summary">
                <div>
                    <h3>Riepilogo Strategia</h3>
                    <span id="strategy-summary">Nessuna opzione aggiunta</span>
                </div>
            </div>
            <div class="strategy-template-box">
                <label for="strategy-preset">Strategia predefinita</label>
                <select id="strategy-preset" class="strategy-template-select">
                    <option value="">Seleziona una strategia...</option>
                    <option value="ironCondor">Iron Condor</option>
                    <option value="ironButterfly">Iron Butterfly</option>
                </select>
            </div>
            <div id="strategy-display" class="strategy-list">
                <div class="empty-state">Nessuna opzione aggiunta. Usa i controlli a destra per iniziare.</div>
            </div>
        </div>
        <div class="right">
            <div class="controls">
                <h3>Aggiungi Opzione</h3>
                <input type="text" id="ticker" value="XSP" placeholder="Ticker (es. AAPL)">
                <input type="text" id="expiration" placeholder="Scadenza YYMMDD (es. 260430)">
                
                <input type="text" id="strike" placeholder="Strike (es. 150)">
                <input type="text" id="price" placeholder="Prezzo (es. 5.00) - opzionale">
                
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="buyPut" style="flex: 1;">Compra PUT</button>
                    <button id="sellPut" style="flex: 1;">Vendi PUT</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button id="buyCall" style="flex: 1;">Compra CALL</button>
                    <button id="sellCall" style="flex: 1;">Vendi CALL</button>
                </div>
                
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #334155;">
                
                <button id="clearAll" class="danger" style="margin-bottom: 15px;">Cancella Tutto</button>
                <button id="openOptionStrat" class="primary" style="margin-top: auto;">Apri su OptionStrat</button>
            </div>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;">
                <h4 style="font-size: 12px; color: #94a3b8;">URL Preview</h4>
                <div class="url-box" id="url-preview">-</div>
            </div>
        </div>
    </div>

    <script>
        let optionsList = [];

        // Event listeners per i pulsanti
        document.getElementById('buyPut').addEventListener('click', () => addOption('Compra', 'PUT'));
        document.getElementById('sellPut').addEventListener('click', () => addOption('Vendi', 'PUT'));
        document.getElementById('buyCall').addEventListener('click', () => addOption('Compra', 'CALL'));
        document.getElementById('sellCall').addEventListener('click', () => addOption('Vendi', 'CALL'));
        document.getElementById('strategy-preset').addEventListener('change', (event) => loadPresetStrategy(event.target.value));
        document.getElementById('openOptionStrat').addEventListener('click', openOptionStrat);
        document.getElementById('clearAll').addEventListener('click', clearAll);

        function addOption(action, type) {
            const ticker = document.getElementById('ticker').value.trim();
            const expiration = document.getElementById('expiration').value.trim();
            const strike = document.getElementById('strike').value.trim();
            const price = document.getElementById('price').value.trim();

            if (!ticker || !expiration || !strike) {
                alert('Per favore, compila ticker, scadenza e strike.');
                return;
            }

            // Validazione formato scadenza YYMMDD
            if (!/^\d{6}$/.test(expiration)) {
                alert('Scadenza deve essere in formato YYMMDD (es. 260430)');
                return;
            }

            const option = {
                action: action,
                type: type,
                ticker: ticker.toUpperCase(),
                expiration: expiration,
                strike: strike,
                price: price || null
            };

            optionsList.push(option);
            updateDisplay();
            
            // Pulisci i campi input
            document.getElementById('strike').value = '';
            document.getElementById('price').value = '';
            document.getElementById('strike').focus();
        }

        function removeOption(index) {
            optionsList.splice(index, 1);
            updateDisplay();
        }

        function clearAll() {
            if (optionsList.length === 0) {
                alert('Nessuna opzione da cancellare');
                return;
            }
            if (confirm('Sei sicuro di voler cancellare tutte le opzioni?')) {
                optionsList = [];
                updateDisplay();
            }
        }

        function loadPresetStrategy(presetKey) {
            if (!presetKey) return;

            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const expiration = document.getElementById('expiration').value.trim();
            if (!ticker || !expiration) {
                alert('Ticker e scadenza devono essere impostati prima di caricare una strategia.');
                document.getElementById('strategy-preset').value = '';
                return;
            }

            const rawStrike = parseInt(document.getElementById('strike').value.trim(), 10);
            const centerStrike = Number.isFinite(rawStrike) ? rawStrike : 150;

            const presets = {
                ironCondor: [
                    { action: 'Compra', type: 'PUT', strike: centerStrike - 40 },
                    { action: 'Vendi', type: 'PUT', strike: centerStrike - 20 },
                    { action: 'Vendi', type: 'CALL', strike: centerStrike + 20 },
                    { action: 'Compra', type: 'CALL', strike: centerStrike + 40 }
                ],
                ironButterfly: [
                    { action: 'Compra', type: 'PUT', strike: centerStrike - 20 },
                    { action: 'Vendi', type: 'PUT', strike: centerStrike },
                    { action: 'Vendi', type: 'CALL', strike: centerStrike },
                    { action: 'Compra', type: 'CALL', strike: centerStrike + 20 }
                ]
            };

            optionsList = presets[presetKey].map((item) => ({
                ...item,
                ticker,
                expiration,
                price: null
            }));
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('strategy-display');
            const urlPreview = document.getElementById('url-preview');
            const summary = document.getElementById('strategy-summary');

            if (optionsList.length === 0) {
                display.innerHTML = '<div class="empty-state">Nessuna opzione aggiunta. Usa i controlli a destra per iniziare.</div>';
                summary.textContent = 'Nessuna opzione aggiunta';
                urlPreview.textContent = '-';
                document.getElementById('openOptionStrat').disabled = true;
                return;
            }

            summary.textContent = `Opzioni totali: ${optionsList.length}`;
            document.getElementById('openOptionStrat').disabled = false;

            // Aggiorna visualizzazione lista con una tabella semplice e campi modificabili
            display.innerHTML = `
                <table class="strategy-table">
                    <thead>
                        <tr>
                            <th>Operazione</th>
                            <th>Ticker</th>
                            <th>Scadenza</th>
                            <th>Strike</th>
                            <th>Prezzo</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${optionsList.map((option, index) => {
                            const priceValue = option.price ? option.price : '';
                            const rowClass = option.type === 'PUT' ? 'put' : 'call';
                            return `
                                <tr class="${rowClass}">
                                    <td>
                                        <select onchange="updateOptionField(${index}, 'action', this.value)">
                                            <option value="Compra" ${option.action === 'Compra' ? 'selected' : ''}>Compra</option>
                                            <option value="Vendi" ${option.action === 'Vendi' ? 'selected' : ''}>Vendi</option>
                                        </select>
                                        <select onchange="updateOptionField(${index}, 'type', this.value)" style="margin-top: 6px;">
                                            <option value="PUT" ${option.type === 'PUT' ? 'selected' : ''}>PUT</option>
                                            <option value="CALL" ${option.type === 'CALL' ? 'selected' : ''}>CALL</option>
                                        </select>
                                    </td>
                                    <td><input type="text" value="${option.ticker}" onchange="updateOptionField(${index}, 'ticker', this.value)"></td>
                                    <td><input type="text" value="${option.expiration}" onchange="updateOptionField(${index}, 'expiration', this.value)"></td>
                                    <td><input type="text" value="${option.strike}" onchange="updateOptionField(${index}, 'strike', this.value)"></td>
                                    <td><input type="text" value="${priceValue}" onchange="updateOptionField(${index}, 'price', this.value)"></td>
                                    <td class="actions"><button class="strategy-remove" onclick="removeOption(${index})">×</button></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            // Aggiorna URL preview
            const url = buildOptionStratURL();
            urlPreview.textContent = url;
        }

        function buildOptionStratURL() {
            if (optionsList.length === 0) return '-';

            const ticker = optionsList[0].ticker;
            const optionsString = optionsList.map(option => {
                const sign = option.action === 'Vendi' ? '-' : '';
                const typeCode = option.type === 'PUT' ? 'P' : 'C';
                const pricePart = option.price ? `@${option.price}` : '';
                return `${sign}.${option.ticker}${option.expiration}${typeCode}${option.strike}${pricePart}`;
            }).join(',');

            const encodedOptionsString = encodeURIComponent(optionsString).replace(/%40/g, '@');
            return `https://optionstrat.com/build/custom/${ticker}/${encodedOptionsString}`;
        }

        function updateOptionField(index, field, value) {
            const option = optionsList[index];
            if (!option) return;

            const normalizedValue = field === 'ticker' ? value.toUpperCase() : value;
            option[field] = normalizedValue;
            updateDisplay();
        }

        function openOptionStrat() {
            if (optionsList.length === 0) {
                alert('Aggiungi almeno un\'opzione prima di aprire OptionStrat');
                return;
            }
            const url = buildOptionStratURL();
            window.open(url, '_blank');
        }

        function getTodayExpiration() {
            const today = new Date();
            const year = String(today.getFullYear()).slice(-2);
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        // Aggiungi focus e scadenza di default quando la pagina carica
        window.addEventListener('load', () => {
            document.getElementById('ticker').focus();
            document.getElementById('expiration').value = getTodayExpiration();
        });

        // Permetti di aggiungere opzione col tasto Enter
        document.getElementById('strike').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const action = document.querySelector('[data-action]')?.getAttribute('data-action') || 'Compra';
                const type = document.querySelector('[data-type]')?.getAttribute('data-type') || 'CALL';
                // Usa Call di default
                const ticker = document.getElementById('ticker').value.trim();
                if (ticker) addOption('Compra', 'CALL');
            }
        });
    </script>
</body>
</html>
